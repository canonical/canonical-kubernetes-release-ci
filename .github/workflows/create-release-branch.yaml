name: Confirm Snap Builds

on:
  workflow_dispatch:
    inputs:
      branches:
        type: string
        required: false
        default: ""  # defaults to all matching branches (main and release branches)
        description: Run on which k8s-snap branches (space separated). If empty, it will run on all matching branches (main and release branches).
  workflow_call:
    inputs:
      branches:
        type: string
        required: false
        default: ""  # defaults to all matching branches (main and release branches)
        description: Run on which k8s-snap branches (space separated). If empty, it will run on all matching branches (main and release branches).

permissions:
  contents: read

jobs:
  release-track:
    runs-on: ubuntu-latest
    env:
      CHARMCRAFT_AUTH : ${{ secrets.CHARMCRAFT_AUTH }}
      LPCREDS_B64: ${{ secrets.LP_CREDS }}
      LPCREDS: ./lp_creds
    steps:
      - name: Checking out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: '.python-version'
      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
      - run: uv tool install tox --with tox-uv
      - name: Install tools
        run: |
          sudo snap install snapcraft --classic
      - run: 'echo $LPCREDS_B64 | base64 --decode > $LPCREDS'
        shell: bash
      - name: Ensure Tracks and Recipes
        run: |
          tox -e runner -- scripts/ensure_snap_builds.py --branch ${{ inputs.branches }}
